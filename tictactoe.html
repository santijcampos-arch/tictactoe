<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8d8ea;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8d8ea; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 2rem;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box span {
      display: block;
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8d8ea; }
    .score-box.tie-score span { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div class="score-box x-score">X <span id="xScore">0</span></div>
    <div class="score-box tie-score">Ties <span id="tieScore">0</span></div>
    <div class="score-box o-score">O <span id="oScore">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const xScoreEl = document.getElementById('xScore');
    const oScoreEl = document.getElementById('oScore');
    const tieScoreEl = document.getElementById('tieScore');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    let scores = { X: 0, O: 0, tie: 0 };

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = `Player X's turn`;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: 'tie' };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner === 'tie') {
            status.textContent = "It's a tie!";
            scores.tie++;
            tieScoreEl.textContent = scores.tie;
          } else {
            status.textContent = `Player ${result.winner} wins!`;
            result.line.forEach(idx => cells[idx].classList.add('win'));
            scores[result.winner]++;
            xScoreEl.textContent = scores.X;
            oScoreEl.textContent = scores.O;
          }
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `Player ${current}'s turn`;
        }
      });
    });

    restartBtn.addEventListener('click', init);

    init();
  </script>
</body>
</html>
